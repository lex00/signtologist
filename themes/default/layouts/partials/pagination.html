{{- $p := . -}}
{{- if gt $p.TotalPages 1 -}}
<nav class="pagination">
  {{- if $p.HasPrev }}
    <a href="{{ $p.Prev.URL }}" class="pagination-link">← Newer</a>
  {{- end }}
  <span class="pagination-info">Page {{ $p.PageNumber }} of {{ $p.TotalPages }}</span>
  {{- if $p.HasNext }}
    <a href="{{ $p.Next.URL }}" class="pagination-link">Older →</a>
  {{- end }}
</nav>
{{- end -}}
